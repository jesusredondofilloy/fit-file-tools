# Nginx site for fit-file-tools backend.
# Listens on port 80 (HTTP) — certbot --nginx will add the TLS server block
# automatically when you run the post-install certificate step.
#
# Replace __HOST__ with your <vm-ip>.sslip.io hostname before symlinking.

server {
    listen 80;
    listen [::]:80;
    server_name __HOST__;

    # Allow large multipart uploads (raw .fit files are typically <2 MB,
    # but Garmin multi-hour activities can approach 10 MB).
    client_max_body_size 25M;

    # Reasonable upload timeouts (multi-MB .fit on slow mobile uplink).
    client_body_timeout 60s;
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;

    # Throttle abuse — see deploy/nginx/rate-limit.conf for the zone definition.
    limit_req zone=fittools burst=20 nodelay;
    limit_req_status 429;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Tiny, harmless probe — useful for uptime monitors.
    location = /health {
        proxy_pass http://127.0.0.1:8000/health;
        access_log off;
    }
}
